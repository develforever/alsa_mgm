<main class="main">
  <div class="content">
    <div class="left-side">
      <app-top-menu></app-top-menu>
    </div>
    <div class="divider" role="separator" aria-label="Divider"></div>
    <div class="right-side">
      @if (dashboardService.isDashboardActive() && authService.isLoggedIn()) {
      <div class="edit-mode-controls flex flex-gap-1 items-center" style="margin-right: 16px;">
        <mat-slide-toggle [checked]="dashboardService.isEditMode()" (change)="dashboardService.toggleEditMode()"
          color="primary">
          Tryb edycji
        </mat-slide-toggle>

        @if (dashboardService.isEditMode()) {
        <button mat-flat-button color="accent" (click)="dashboardService.saveChanges()">
          <mat-icon>save</mat-icon> Zapisz
        </button>
        }
      </div>
      }

      @if (authService.isLoggedIn()) {

      <button mat-button [matMenuTriggerFor]="userMenu">
        <mat-icon>account_circle</mat-icon>
        {{ appStore.user()?.displayName }}
      </button>
      <mat-menu #userMenu="matMenu">
        <a mat-menu-item (click)="onLogout()" role="menuitem" tabindex="0" (keyup.enter)="onLogout()"
          (keyup.space)="onLogout()">
          <mat-icon>logout</mat-icon>
          <span>Wyloguj</span>
        </a>
      </mat-menu>

      } @else if(router.url !== '/login') {
      <a mat-button routerLink="/login">Zaloguj się</a>
      }
    </div>
  </div>
  <div class="full-width">

    <app-breadcrumb [items]="currentTitle()"></app-breadcrumb>

    <router-outlet />
  </div>
</main>
