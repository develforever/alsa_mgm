<div class="audit-container">
  <h3>Audit Trail (System Logs)</h3>
  <table class="audit-table">
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>User</th>
        <th>Action</th>
        <th>Entity</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let log of logs()">
        <td>{{ log.timestamp | date:'short' }}</td>
        <td><strong>{{ log.userEmail }}</strong></td>
        <td><span [class]="log.action">{{ log.action }}</span></td>
        <td>{{ log.entityName }} (#{{ log.entityId }})</td>
        <td><pre>{{ log.details | json }}</pre></td>
      </tr>
    </tbody>
  </table>
</div>
