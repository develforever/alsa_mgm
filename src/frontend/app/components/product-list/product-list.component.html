<div class="product-container">
  <h2>Product Management</h2>

  <div class="add-bar">
    <input [(ngModel)]="newProductName" placeholder="New Product Name (e.g. 8DAB)">
    <button (click)="addProduct()">Add Product</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Product Name</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of products()">
        <td>{{ p.ProductID }}</td>
        <td>{{ p.Name }}</td>
        <td>
          <span [class.active-chip]="p.Active === 1" [class.inactive-chip]="p.Active === 0">
            {{ p.Active === 1 ? 'Active' : 'Inactive' }}
          </span>
        </td>
        <td>
          <button (click)="toggleActive(p)">Toggle Status</button>
          <button (click)="deleteProduct(p)">Delete Product</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
