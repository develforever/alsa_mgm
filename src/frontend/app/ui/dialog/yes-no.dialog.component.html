<h2 mat-dialog-title>{{data.title}}</h2>
<mat-dialog-content>
    {{data.content}}
</mat-dialog-content>
<mat-dialog-actions>
    <button matButton mat-dialog-close (click)="onNoClick()">No</button>
    <button matButton mat-dialog-close cdkFocusInitial (click)="onYesClick()">Ok</button>
</mat-dialog-actions>
