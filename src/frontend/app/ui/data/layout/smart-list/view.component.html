@if(item()){
<mat-card appearance="outlined">
    <mat-card-header>
        <mat-card-title>Szczegóły</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <mat-card-subtitle> ID: #{{ item()?.ProductID || item()?.id }}</mat-card-subtitle>
        <mat-card-subtitle> Nazwa: {{ item()?.Name || item()?.name }}</mat-card-subtitle>
        <mat-card-subtitle> Status: {{ item()?.Active ? 'Aktywny' : 'Nieaktywny' }}</mat-card-subtitle>
        <mat-card-subtitle> Utworzono: {{ item()?.CreatedAt || item()?.createdAt }}</mat-card-subtitle>
        <mat-card-subtitle> Zaktualizowano: {{ item()?.UpdatedAt || item()?.updatedAt }}</mat-card-subtitle>
    </mat-card-content>

    <mat-card-actions>
        <button matButton (click)="closeSidebar()">Zamknij</button>
        <button matButton (click)="editProduct()">Edytuj</button>
        <button matButton (click)="deleteProduct()">Usuń</button>
    </mat-card-actions>
</mat-card>
}
