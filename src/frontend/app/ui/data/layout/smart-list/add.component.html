<mat-card appearance="outlined">
    <mat-card-header>
        Dodaj nowy produkt
    </mat-card-header>

    <mat-card-content>
        <mat-form-field>
            <mat-label>Nazwa produktu (np. 8DAB)</mat-label>
            <input matInput [(ngModel)]="newProductName">
        </mat-form-field>
    </mat-card-content>

    <mat-card-actions>
        <button matButton (click)="addProduct()">Dodaj produkt</button>
        <button matButton (click)="closeSidebar()">Anuluj</button>
    </mat-card-actions>

</mat-card>
