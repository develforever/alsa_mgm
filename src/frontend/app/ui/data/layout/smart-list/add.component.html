<mat-card appearance="outlined" data-testid="sidebar-add-card">
    <mat-card-header>
        <mat-card-title>Dodaj nowy element</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <form [formGroup]="itemForm" (ngSubmit)="addItem()">
            @for (control of itemForm.controls | keyvalue: keepOrder; track control.key) {
                <app-smart-form-field 
                    [control]="getControl(control.key)" 
                    [key]="control.key" 
                    [config]="fieldConfigs[control.key]">
                </app-smart-form-field>
            }
        </form>
    </mat-card-content>

    <mat-card-actions>
        <button matButton (click)="addItem()" data-testid="sidebar-add-save-button">Dodaj</button>
        <button matButton (click)="closeSidebar()" data-testid="sidebar-add-cancel-button">Anuluj</button>
    </mat-card-actions>

</mat-card>
