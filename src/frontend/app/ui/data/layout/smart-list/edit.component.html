@if(item()){
<mat-card appearance="outlined" data-testid="sidebar-edit-card">
    <mat-card-header>
        <mat-card-title>Edycja</mat-card-title>
    </mat-card-header>
    <mat-card-content>
        <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
            @for (control of itemForm.controls | keyvalue: keepOrder; track control.key) {
                <app-smart-form-field 
                    [control]="getControl(control.key)" 
                    [key]="control.key" 
                    [config]="fieldConfigs[control.key]">
                </app-smart-form-field>
            }
        </form>
    </mat-card-content>

    <mat-card-actions>
        <button matButton (click)="closeSidebar()" data-testid="sidebar-edit-close-button">Zamknij</button>
        <button matButton (click)="updateItem()" data-testid="sidebar-edit-update-button">Aktualizuj</button>
    </mat-card-actions>
</mat-card>
}
