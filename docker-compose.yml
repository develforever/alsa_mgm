version: '3.8'
services:
  db:
    image: mysql:8.0
    container_name: transmar_db
    restart: always
    environment:
      MYSQL_DATABASE: transmar_task
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: user
      MYSQL_PASSWORD: user_password
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql
      # - ./init.sql:/docker-entrypoint-initdb.d/init.sql